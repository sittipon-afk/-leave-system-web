<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement OCR to Excel</title>
    <!-- โหลด Tesseract.js และ SheetJS ผ่าน CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        #preview { max-width: 100%; margin-top: 10px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px;}
        button:disabled { background: #ccc; }
        .status { margin-top: 10px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>แปลงใบแจ้งยอดธนาคารเป็น Excel (OCR)</h1>
    <p>อัปโหลดรูปภาพใบแจ้งยอด (JPG, PNG) เพื่อแยกข้อมูลและดาวน์โหลดเป็น Excel</p>
    
    <div class="container">
        <input type="file" id="uploader" accept="image/*">
        <br>
        <img id="preview" alt="Preview">
        <div id="status" class="status"></div>
        
        <button id="downloadBtn" disabled>ดาวน์โหลด Excel</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>วันที่</th>
                <th>รายการ</th>
                <th>เงินฝาก</th>
                <th>เงินถอน</th>
                <th>ยอดคงเหลือ</th>
            </tr>
        </thead>
        <tbody>
            <!-- ข้อมูลจะปรากฏที่นี่ -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
