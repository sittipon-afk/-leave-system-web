<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Bank Statement to Excel</title>
    <!-- Tesseract JS for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- PDF.js for converting PDF to Image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        .container { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; text-align: center; background: #f9f9f9; }
        input[type="file"] { margin: 20px 0; }
        
        #preview-container { 
            margin-top: 20px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
        }
        .page-preview { 
            border: 1px solid #ddd; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            max-width: 100%; 
            height: auto; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9rem; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }

        button { 
            padding: 12px 24px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 1rem; 
            margin-top: 20px;
        }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #219150; }

        .status { margin: 15px 0; font-weight: bold; color: #e67e22; min-height: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>แปลงใบแจ้งยอดธนาคาร (PDF) เป็น Excel</h1>
    <p style="text-align: center;">อัปโหลดไฟล์ PDF ใบแจ้งยอด ระบบจะแปลงเป็นรูปภาพและอ่านข้อมูลด้วย OCR</p>
    
    <div class="container">
        <input type="file" id="uploader" accept="application/pdf">
        <div id="status" class="status"></div>
        
        <div id="preview-container"></div>
        
        <button id="downloadBtn" disabled>ดาวน์โหลดไฟล์ Excel</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th width="15%">วันที่</th>
                <th width="45%">รายการ</th>
                <th width="15%">เงินฝาก</th>
                <th width="15%">เงินถอน</th>
                <th width="15%">ยอดคงเหลือ</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
