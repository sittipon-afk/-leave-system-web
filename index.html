<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR ใบแจ้งยอดธนาคาร (PDF to Excel)</title>
    
    <!-- โหลด Library ที่จำเป็น -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .container { border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #preview-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
        .page-preview { border: 1px solid #ccc; max-width: 200px; display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 1rem; margin-top: 15px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button#downloadBtn { background: #007bff; }
        
        .status { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 4px; color: #333; white-space: pre-wrap; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>แปลงใบแจ้งยอดธนาคาร (PDF) เป็น Excel</h1>
    <p>รองรับไฟล์ PDF ภาษาไทย (ระบบประมวลผลในเบราว์เซอร์ของคุณ 100%)</p>
    
    <div class="container">
        <input type="file" id="uploader" accept="application/pdf">
        <div id="status" class="status">รออัปโหลดไฟล์...</div>
        
        <div id="preview-container"></div>
        
        <button id="downloadBtn" disabled>ดาวน์โหลดไฟล์ Excel</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th width="15%">วันที่</th>
                <th width="40%">รายการ</th>
                <th width="15%">เงินฝาก</th>
                <th width="15%">เงินถอน</th>
                <th width="15%">ยอดคงเหลือ</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
