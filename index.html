<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Bank Statement to Excel</title>
    <!-- Tesseract.js สำหรับ OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- SheetJS สำหรับสร้าง Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- PDF.js สำหรับอ่าน PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #333; }
        h1 { text-align: center; color: #0056b3; }
        .container { border: 2px dashed #ccc; padding: 30px; border-radius: 10px; text-align: center; background: #f9f9f9; }
        input[type="file"] { margin: 20px 0; }
        
        #preview-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .page-preview { border: 1px solid #ddd; padding: 5px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page-preview img { max-width: 200px; height: auto; display: block; }
        .page-label { font-size: 12px; text-align: center; margin-top: 5px; color: #666; }

        table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #0056b3; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }

        button { padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #218838; }

        .status { margin: 15px 0; font-weight: bold; color: #d9534f; min-height: 24px; }
        .progress-bar { width: 100%; background-color: #e0e0e0; border-radius: 5px; margin-top: 10px; display: none; }
        .progress-fill { height: 10px; background-color: #007bff; width: 0%; border-radius: 5px; transition: width 0.3s; }
    </style>
</head>
<body>

    <h1>แปลง PDF ใบแจ้งยอดธนาคาร เป็น Excel</h1>
    <p style="text-align: center;">อัปโหลดไฟล์ PDF (รองรับหลายหน้า) ระบบจะประมวลผลในเบราว์เซอร์ของคุณเท่านั้น</p>

    <div class="container">
        <input type="file" id="pdfUploader" accept="application/pdf">
        <div id="status" class="status"></div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div id="preview-container"></div>
        
        <button id="downloadBtn" disabled>ดาวน์โหลดไฟล์ Excel</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th width="15%">วันที่</th>
                <th width="45%">รายการ</th>
                <th width="15%">เงินฝาก</th>
                <th width="15%">เงินถอน</th>
                <th width="15%">ยอดคงเหลือ</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
